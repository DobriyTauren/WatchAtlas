name: Deploy GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: WatchAtlas/tailwind-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: WatchAtlas/tailwind-frontend
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: WatchAtlas/tailwind-frontend
        run: npm run build:css

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Restore .NET dependencies
        run: dotnet restore WatchAtlas/WatchAtlas.csproj

      - name: Publish Blazor WebAssembly app
        run: dotnet publish WatchAtlas/WatchAtlas.csproj -c Release -o ${{ github.workspace }}/artifacts/publish

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/artifacts/publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
